name: Readme Chess

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  update-board:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: marcizhu/readme-chess@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
